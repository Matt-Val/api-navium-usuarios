spring.datasource.url=${DB_URL:jdbc:postgresql://navium-db-central.c3wswcuwyhon.us-east-1.rds.amazonaws.com:5432/navium_db?currentSchema=navium}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:naviumDB}
spring.datasource.currentSchema=navium

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=navium

# Clave secreta para firmar y validar los JWT (protegida)
jwt.secret=${JWT_SECRET:NaviumSuperSecretKeyParaFirmaDeTokens2026!}